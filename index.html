<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#10122a" />
  <meta name="description" content="컴퓨터그래픽기능사 필기 핵심노트, 암기카드, CBT 퀴즈를 한 번에 학습하는 웹앱" />
  <title>픽셀패스 — 컴퓨터그래픽기능사 필기 합격노트</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="ambient ambient-one"></div>
  <div class="ambient ambient-two"></div>

  <div class="app-shell">
    <aside class="sidebar" aria-label="주 메뉴">
      <button class="brand" data-route="home" aria-label="홈으로">
        <span class="brand-mark"><i></i><i></i><i></i><i></i></span>
        <span><b>PIXEL PASS</b><small>필기 합격노트</small></span>
      </button>

      <nav class="side-nav">
        <button class="nav-item active" data-route="home"><span class="nav-icon">⌂</span><span>오늘의 학습</span></button>
        <button class="nav-item" data-route="notes"><span class="nav-icon">▤</span><span>핵심노트</span></button>
        <button class="nav-item" data-route="cards"><span class="nav-icon">◇</span><span>암기카드</span><em id="due-badge">0</em></button>
        <button class="nav-item" data-route="quiz"><span class="nav-icon">✓</span><span>CBT 퀴즈</span></button>
        <button class="nav-item" data-route="wrong"><span class="nav-icon">↺</span><span>오답노트</span><em id="wrong-badge">0</em></button>
      </nav>

      <div class="sidebar-card">
        <div class="mini-ring" id="side-ring"><span id="side-progress">0%</span></div>
        <div><small>전체 숙련도</small><strong id="side-level">첫 회독 시작</strong></div>
      </div>
      <p class="sidebar-foot">60문항 중 36문항이면 합격<br><b>목표는 안정권 65~75점</b></p>
    </aside>

    <header class="topbar">
      <button class="mobile-brand" data-route="home"><span class="brand-mark"><i></i><i></i><i></i><i></i></span><b>PIXEL PASS</b></button>
      <div class="top-actions">
        <span class="streak-pill">🔥 <b id="streak-count">1</b>일째</span>
        <button class="icon-button" id="reset-button" title="학습 기록 초기화" aria-label="학습 기록 초기화">↻</button>
      </div>
    </header>

    <main id="app" tabindex="-1"></main>

    <nav class="bottom-nav" aria-label="모바일 메뉴">
      <button class="active" data-route="home"><span>⌂</span><small>오늘</small></button>
      <button data-route="notes"><span>▤</span><small>노트</small></button>
      <button data-route="cards"><span>◇</span><small>카드</small></button>
      <button data-route="quiz"><span>✓</span><small>퀴즈</small></button>
      <button data-route="wrong"><span>↺</span><small>오답</small></button>
    </nav>
  </div>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>
  <div class="modal-backdrop" id="modal" hidden>
    <section class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <button class="modal-close" data-close-modal aria-label="닫기">×</button>
      <div id="modal-content"></div>
    </section>
  </div>

  <script src="app.js"></script>
</body>
</html>
